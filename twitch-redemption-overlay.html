<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Twitch Redemption Overlay</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:transparent;overflow:hidden;font-family:'Inter','Segoe UI',sans-serif;width:100vw;height:100vh;display:flex;align-items:flex-start;justify-content:flex-end;padding:24px;}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
#popup{position:relative;width:380px;background:${hexToRgba(cbg,0.96)};border:1px solid ${cR(cbr,0.5)};border-radius:16px;padding:20px 22px 18px;backdrop-filter:blur(12px);box-shadow:0 0 0 1px ${cR(cbr,0.12)},0 8px 40px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.06);opacity:0;transform:translateX(40px) scale(0.96);pointer-events:none;}
#popup.show{animation:si 0.45s cubic-bezier(0.22,1,0.36,1) forwards;}
#popup.hide{animation:so 0.35s cubic-bezier(0.4,0,1,1) forwards;}
@keyframes si{0%{opacity:0;transform:translateX(40px) scale(0.95)}100%{opacity:1;transform:translateX(0) scale(1)}}
@keyframes so{0%{opacity:1;transform:translateX(0) scale(1)}100%{opacity:0;transform:translateX(40px) scale(0.95)}}
#pb{position:absolute;bottom:0;left:0;height:3px;width:100%;border-radius:0 0 16px 16px;overflow:hidden;background:rgba(255,255,255,0.06);}
#pf{height:100%;width:100%;background:linear-gradient(90deg,${cprog},${cl});transform-origin:left;transform:scaleX(1);}
.tr{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.ci{flex-shrink:0;width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,${c},${cl});display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 4px ${cR(c,0.18)};}
.ci svg{width:20px;height:20px;}
.badge{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:${cl};background:${cR(c,0.18)};border:1px solid ${cR(c,0.3)};border-radius:6px;padding:3px 8px;white-space:nowrap;}
.sp{flex:1;}
.xb{width:22px;height:22px;background:rgba(255,255,255,0.06);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;color:rgba(255,255,255,0.35);font-size:13px;}
.nr{display:flex;align-items:baseline;gap:10px;margin-bottom:6px;}
.rn{font-size:17px;font-weight:700;color:${ctitle};letter-spacing:-.01em;line-height:1.25;word-break:break-word;flex:1;}
.rc{font-size:11px;font-weight:600;color:${cR(cl,0.8)};white-space:nowrap;flex-shrink:0;}
.cn{color:${cl};font-weight:700;display:inline-block;}
.cn.bump{animation:bump 0.35s cubic-bezier(0.22,1,0.36,1);}
@keyframes bump{0%{transform:scale(1)}45%{transform:scale(1.45);color:#fff}100%{transform:scale(1)}}
.ur{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.av{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,${c},#18181b);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;border:1.5px solid ${cR(c,0.5)};overflow:hidden;}
.un{font-size:13px;font-weight:600;color:${cl};}
.rl{font-size:13px;color:${csub};}
.um{font-size:13.5px;color:rgba(255,255,255,0.75);line-height:1.55;background:rgba(255,255,255,0.04);border-left:2.5px solid ${cR(cmsg,0.7)};border-radius:0 8px 8px 0;padding:8px 12px;margin-top:6px;word-break:break-word;}
@keyframes pr{0%,100%{box-shadow:0 0 0 4px ${cR(c,0.18)}}50%{box-shadow:0 0 0 8px ${cR(c,0.06)}}}
#popup.show .ci{animation:pr 2s ease-in-out infinite;}
</style></head><body>
<div id="popup">
  <div class="tr">
    <div class="ci"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" fill="rgba(255,255,255,0.12)"/><path d="M12 6.5C9.52 6.5 7.5 8.52 7.5 11C7.5 13.48 9.52 15.5 12 15.5C14.48 15.5 16.5 13.48 16.5 11" stroke="white" stroke-width="1.8" stroke-linecap="round"/><circle cx="16.5" cy="11" r="1" fill="white"/><path d="M12 15.5V18" stroke="white" stroke-width="1.8" stroke-linecap="round"/><path d="M9.5 18H14.5" stroke="white" stroke-width="1.8" stroke-linecap="round"/></svg></div>
    <span class="badge">Channel Points</span>
    <div class="sp"></div>
    <button class="xb" onclick="hidePopup()">&#x2715;</button>
  </div>
  <div class="nr"><div class="rn" id="rn">Loading...</div><span class="rc">×<span class="cn" id="cn">1</span></span></div>
  <div class="ur"><div class="av"><span id="ai">?</span></div><span class="un" id="un"></span><span class="rl">redeemed</span></div>
  <div class="um" id="um" style="display:none"></div>
  <div id="pb"><div id="pf"></div></div>
</div>
<script>
const CFG={displayDuration:7000,queue:true};
let vis=false,ht=null;
const Q=[],RC={};

let _actx=null;
function _actxGet(){if(!_actx)_actx=new(window.AudioContext||window.webkitAudioContext)();return _actx;}
function playSound(){try{const ctx=_actxGet();[523.25,659.25,783.99].forEach((f,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='sine';o.frequency.value=f;const t=ctx.currentTime+i*0.13;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.35,t+0.02);g.gain.exponentialRampToValueAtTime(0.0001,t+0.55);o.start(t);o.stop(t+0.55);});}catch(e){}}
function show(d){
  const pop=document.getElementById('popup');
  const title=d.rewardTitle||'Channel Point Reward';
  RC[title]=(RC[title]||0)+1;
  const cnt=RC[title];
  document.getElementById('rn').textContent=title;
  document.getElementById('un').textContent=d.userDisplayName||d.userName||'viewer';
  document.getElementById('ai').textContent=(d.userDisplayName||d.userName||'?').slice(0,2).toUpperCase();
  const ce=document.getElementById('cn');
  if(ce){ce.textContent=cnt;ce.classList.remove('bump');void ce.offsetWidth;ce.classList.add('bump');}
  const me=document.getElementById('um');
  if(d.userInput&&d.userInput.trim()){me.textContent='"'+d.userInput.trim()+'"';me.style.display='block';}else{me.style.display='none';}
  playSound();
  vis=true;pop.classList.remove('hide');pop.classList.add('show');
  const pf=document.getElementById('pf');
  pf.style.transition='none';pf.style.transform='scaleX(1)';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{pf.style.transition='transform '+CFG.displayDuration+'ms linear';pf.style.transform='scaleX(0)';}));
  clearTimeout(ht);ht=setTimeout(hidePopup,CFG.displayDuration);
}
function hidePopup(){
  const pop=document.getElementById('popup');
  if(!vis)return;clearTimeout(ht);
  pop.classList.remove('show');pop.classList.add('hide');vis=false;
  pop.addEventListener('animationend',function h(){pop.classList.remove('hide');pop.removeEventListener('animationend',h);if(Q.length>0){const n=Q.shift();setTimeout(()=>show(n),200);}},{once:true});
}
window.triggerRedemption=function(d){if(vis&&CFG.queue)Q.push(d);else show(d);};

// ── Twitch EventSub via WebSocket (no server needed) ──────────
const ACCESS_TOKEN = 'pwacb91sgzrd8ydz0nidarrw7rigcx';
const CLIENT_ID    = '0d3ykw6uvivon5wygiikiu47az86xn';
const USER_ID      = '78615283';

(function connectEventSub() {
  if (!ACCESS_TOKEN || !USER_ID) return;
  const ws = new WebSocket('wss://eventsub.wss.twitch.tv/ws');
  ws.onmessage = async (e) => {
    const msg = JSON.parse(e.data);
    const type = msg.metadata && msg.metadata.message_type;
    if (type === 'session_welcome') {
      const sessionId = msg.payload.session.id;
      // Subscribe to channel point redemptions
      await fetch('https://api.twitch.tv/helix/eventsub/subscriptions', {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + ACCESS_TOKEN,
          'Client-Id': CLIENT_ID,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          type: 'channel.channel_points_custom_reward_redemption.add',
          version: '1',
          condition: { broadcaster_user_id: USER_ID },
          transport: { method: 'websocket', session_id: sessionId }
        })
      });
    }
    if (type === 'notification') {
      const ev = msg.payload.event;
      triggerRedemption({
        rewardTitle:     ev.reward.title,
        userDisplayName: ev.user_name,
        userName:        ev.user_login,
        userInput:       ev.user_input || ''
      });
    }
  };
  ws.onclose = () => setTimeout(connectEventSub, 5000);
})();
</script>
</body></html>
