<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CS2 Challenge Wheel</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
/* ============================================================
   CONFIGURATION — edit these to customize the wheel
   ============================================================ */
:root {
  --wheel-size: 500px;        /* diameter of the wheel */
  --accent: #e8b84b;          /* CS2 bomb yellow */
  --accent2: #4b9fe8;         /* CT blue */
  --danger: #e84b4b;          /* T red */
  --bg-dark: #0a0c0a;         /* near-black tactical */
  --bg-panel: rgba(8,12,8,0.92);
  --border: rgba(232,184,75,0.35);
  --text-dim: rgba(200,210,195,0.5);
}
/* ============================================================ */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  background: transparent !important;
  overflow: hidden;
  font-family: 'Barlow Condensed', sans-serif;
}

#scene {
  width: 100vw; height: 100vh;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 16px;
  position: relative;
  background: transparent;
}



/* ---- Wheel ---- */
#wheel-container {
  position: absolute;
  top: calc(50vh - 250px);
  right: 20px;
  width: var(--wheel-size);
  height: var(--wheel-size);
  display: none;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.6s ease;
  cursor: grab;
  user-select: none;
}
#wheel-container.visible {
  display: block;
  opacity: 1;
  pointer-events: all;
}
#wheel-container.hidden {
  display: none;
  opacity: 0;
  pointer-events: none;
}
#wheel-container.dragging { cursor: grabbing; }

#wheel-canvas {
  border-radius: 50%;
  display: block;
  width: 100%; height: 100%;
  filter: drop-shadow(0 0 20px rgba(232,184,75,0.3));
  transition: filter 0.4s;
}
#wheel-canvas.spinning {
  filter: drop-shadow(0 0 40px rgba(232,184,75,0.7));
}

/* Outer ring — segmented tactical look */
#wheel-ring {
  position: absolute; inset: -8px;
  border-radius: 50%;
  border: 2px solid rgba(232,184,75,0.45);
  pointer-events: none;
}
#wheel-ring::before {
  content: '';
  position: absolute; inset: 4px;
  border-radius: 50%;
  border: 1px solid rgba(232,184,75,0.15);
}

/* Center hub — bomb detonator style */
#spin-hub {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 70px; height: 70px;
  border-radius: 50%;
  background: #0a0c0a;
  border: 2px solid var(--accent);
  cursor: pointer;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 2px;
  transition: background 0.15s, transform 0.1s;
  z-index: 10;
}
#spin-hub::before {
  content: '';
  position: absolute; inset: 4px;
  border-radius: 50%;
  border: 1px solid rgba(232,184,75,0.25);
}
#spin-hub:hover { background: #141a10; transform: translate(-50%,-50%) scale(1.07); }
#spin-hub:active { transform: translate(-50%,-50%) scale(0.96); }
#spin-hub.disabled { opacity: 0.4; cursor: default; pointer-events: none; }
#hub-label { font-family: 'Orbitron', monospace; font-size: 11px; font-weight: 900; letter-spacing: 2px; color: var(--accent); line-height: 1; position: relative; z-index: 1; }
#hub-sub { font-family: 'Share Tech Mono', monospace; font-size: 8px; color: rgba(232,184,75,0.45); letter-spacing: 0.1em; position: relative; z-index: 1; }

/* Pointer — angular tactical arrow */
#pointer {
  position: absolute;
  right: -26px; top: 50%;
  transform: translateY(-50%);
  width: 0; height: 0;
  border-top: 14px solid transparent;
  border-bottom: 14px solid transparent;
  border-right: 26px solid var(--accent);
  filter: drop-shadow(0 0 8px rgba(232,184,75,0.8));
}

/* ---- Status bar — HUD style ---- */
#status-bar {
  display: none !important;
  position: absolute;
  top: 16px; left: 50%; transform: translateX(-50%);
  display: flex; align-items: center; gap: 8px;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 5px 14px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  pointer-events: none;
}
#status-bar::before {
  content: '//';
  color: var(--accent);
  font-size: 10px;
}
.s-dot { width: 7px; height: 7px; border-radius: 50%; background: #333; flex-shrink: 0; }
.s-dot.live { background: #5dca5d; box-shadow: 0 0 6px #5dca5d; }
.s-dot.err  { background: var(--danger); box-shadow: 0 0 6px var(--danger); }

/* ---- Queue pill ---- */
#queue-pill {
  position: absolute;
  bottom: 20px; left: 50%; transform: translateX(-50%);
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 5px 16px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px; letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-dim);
  display: none;
}
#queue-pill.show { display: block; }
#queue-pill span { color: var(--accent); }

/* ---- Result overlay — bomb detonation card ---- */
#result-overlay {
  display: none;
  position: absolute;
  top: 20px;
  right: 20px;
  width: 500px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s;
  cursor: grab;
  user-select: none;
}
#result-overlay.show {
  display: block;
  opacity: 1;
  pointer-events: all;
}
#result-overlay.dragging { cursor: grabbing; }

#result-card {
  background: var(--bg-panel);
  border: 1px solid var(--accent);
  border-radius: 2px;
  padding: 0;
  text-align: center;
  width: 100%;
  position: relative;
  transform: scale(0.92);
  transition: transform 0.3s cubic-bezier(0.34,1.46,0.64,1);
  overflow: hidden;
}
#result-overlay.show #result-card { transform: scale(1); }

/* Top bar on result card */
#result-card::before {
  content: '✷  CHALLENGE SELECTED  ✷';
  display: block;
  background: var(--accent);
  color: #0a0c0a;
  font-family: 'Orbitron', monospace;
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 3px;
  padding: 6px 0;
  text-align: center;
}

#result-card-inner { padding: 24px 40px 28px; }

#res-user {
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px; color: var(--accent2);
  letter-spacing: 0.12em; text-transform: uppercase;
  margin-bottom: 10px;
}
#res-user::before { content: '> '; color: var(--accent); }

#res-challenge {
  font-family: 'Orbitron', monospace;
  font-size: 26px; font-weight: 900;
  letter-spacing: 1px; line-height: 1.2;
  color: #fff;
  margin-bottom: 8px;
  word-break: break-word;
  text-transform: uppercase;
}

#res-tagline {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px; color: var(--text-dim);
  letter-spacing: 0.1em; text-transform: uppercase;
  margin-bottom: 20px;
}

#res-close {
  padding: 8px 28px; font-size: 11px; font-weight: 700;
  font-family: 'Orbitron', monospace; letter-spacing: 2px;
  background: transparent; border: 1px solid var(--accent);
  border-radius: 2px; color: var(--accent);
  cursor: pointer; text-transform: uppercase;
  transition: background 0.15s;
}
#res-close:hover { background: rgba(232,184,75,0.12); }

/* Flash animation on win */
@keyframes cs-flash {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
#result-overlay.show #result-card { animation: cs-flash 0.15s ease 2; }

/* Confetti — square fragments instead of dots */
.confetti-dot {
  position: absolute;
  width: 6px; height: 6px;
  border-radius: 1px;
  animation: confetti-fall 1.6s ease-out forwards;
  pointer-events: none;
}
@keyframes confetti-fall {
  0%   { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
  100% { transform: translateY(90px) rotate(360deg) scale(0.1); opacity: 0; }
}

/* ---- Config panel ---- */
#config-panel {
  display: none;
  position: fixed; inset: 0;
  background: rgba(5,8,5,0.98);
  overflow-y: auto;
  z-index: 1000;
  padding: 32px;
  font-family: 'Barlow Condensed', sans-serif;
}
#config-panel.open { display: block; }
#config-panel h1 {
  font-family: 'Orbitron', monospace;
  font-size: 24px; font-weight: 900;
  color: var(--accent); letter-spacing: 4px;
  text-transform: uppercase; margin-bottom: 4px;
}
#config-panel p.sub { font-family: 'Share Tech Mono', monospace; font-size: 12px; color: var(--text-dim); margin-bottom: 24px; letter-spacing: 0.05em; }
.cfg-section { margin-bottom: 24px; }
.cfg-section h2 {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px; color: var(--accent);
  text-transform: uppercase; letter-spacing: 0.15em;
  margin-bottom: 10px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 6px;
}
.cfg-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.cfg-row label { font-family: 'Share Tech Mono', monospace; font-size: 12px; color: var(--text-dim); width: 150px; flex-shrink: 0; letter-spacing: 0.06em; }
.cfg-row input[type=text], .cfg-row input[type=number] {
  flex: 1; padding: 7px 10px; font-size: 13px; font-family: 'Share Tech Mono', monospace;
  background: rgba(232,184,75,0.04); border: 1px solid var(--border);
  border-radius: 2px; color: #d4e8c8; outline: none; letter-spacing: 0.05em;
}
.cfg-row input:focus { border-color: var(--accent); }
.cfg-row input[type=color] { width: 36px; height: 30px; padding: 2px; border-radius: 2px; border: 1px solid var(--border); background: transparent; cursor: pointer; }

#items-cfg { display: flex; flex-direction: column; gap: 6px; }
.cfg-item { display: flex; align-items: center; gap: 8px; }
.cfg-item input[type=text] { flex: 1; padding: 6px 9px; font-size: 13px; font-family: 'Barlow Condensed', sans-serif; background: rgba(232,184,75,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 2px; color: #d4e8c8; outline: none; }
.cfg-item input[type=color] { width: 32px; height: 28px; padding: 2px; border-radius: 2px; border: none; background: transparent; cursor: pointer; }
.cfg-item input[type=number] { width: 52px; padding: 6px 6px; font-size: 13px; font-family: 'Share Tech Mono', monospace; background: rgba(232,184,75,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 2px; color: #d4e8c8; outline: none; text-align: center; }
.cfg-item button { padding: 5px 10px; background: rgba(232,75,75,0.1); border: 1px solid rgba(232,75,75,0.3); border-radius: 2px; color: #e88888; font-size: 12px; cursor: pointer; font-family: 'Share Tech Mono', monospace; }
.cfg-item button:hover { background: rgba(232,75,75,0.25); }

#cfg-add-item { margin-top: 8px; padding: 7px 18px; font-size: 12px; font-weight: 700; background: transparent; border: 1px solid var(--border); border-radius: 2px; color: var(--accent); cursor: pointer; font-family: 'Share Tech Mono', monospace; letter-spacing: 0.1em; text-transform: uppercase; }
#cfg-add-item:hover { background: rgba(232,184,75,0.08); }

#cfg-save { padding: 10px 32px; font-size: 12px; font-weight: 900; font-family: 'Orbitron', monospace; letter-spacing: 3px; background: var(--accent); color: #0a0c0a; border: none; border-radius: 2px; cursor: pointer; margin-right: 10px; text-transform: uppercase; }
#cfg-save:hover { background: #f5cc6a; }
#cfg-cancel { padding: 10px 20px; font-size: 12px; background: transparent; border: 1px solid rgba(255,255,255,0.15); border-radius: 2px; color: var(--text-dim); cursor: pointer; font-family: 'Share Tech Mono', monospace; }
#cfg-cancel:hover { border-color: rgba(255,255,255,0.3); }

#cfg-status { font-family: 'Share Tech Mono', monospace; font-size: 12px; color: #5dca5d; margin-top: 10px; display: none; letter-spacing: 0.1em; }
#cfg-status::before { content: '// '; }
</style>
</head>
<body>

<!-- ============================================================
     EASY CONFIG — Edit the JS block below to set your defaults
     Or open this file with ?config=1 in the URL for a GUI
     ============================================================ -->

<div id="scene">

  </div>

  <div id="result-overlay">
    <div id="result-card">
      <div id="result-card-inner">
        <div id="res-user"></div>
        <div id="res-challenge"></div>
        <div id="res-tagline">Execute this challenge</div>
        <button id="res-close" onclick="closeResult()">Confirm [ESC]</button>
      </div>
      <div id="conf-container"></div>
    </div>
  </div>

  <div id="wheel-container">
    <canvas id="wheel-canvas" width="600" height="600"></canvas>
    <div id="wheel-ring"></div>
    <div id="pointer"></div>
    <div id="spin-hub" onclick="manualSpin()">
      <span id="hub-label">SPIN</span>
      <span id="hub-sub">click</span>
    </div>
  </div>

  <div id="queue-pill">Queue: <span id="q-count">0</span> waiting</div>
</div>

<!-- Config Panel -->
<div id="config-panel">
  <h1>Wheel Config</h1>
  <p class="sub">Changes are saved to localStorage and loaded automatically on next open.</p>

  <div class="cfg-section">
    <h2>Twitch connection</h2>
    <div class="cfg-row"><label>Client ID</label><input type="text" id="cfg-clientid" placeholder="From dev.twitch.tv/console"/></div>
    <div class="cfg-row"><label>Channel name</label><input type="text" id="cfg-channel" placeholder="yourchannelname"/></div>
    <div class="cfg-row"><label>Channel Points reward name</label><input type="text" id="cfg-reward" placeholder="e.g. Spin the Wheel (must match your reward name exactly)"/></div>
    <div class="cfg-row" style="gap:10px;">
      <label>Twitch auth</label>
      <button id="cfg-auth-btn" onclick="startTwitchAuth()" style="padding:7px 16px;font-size:12px;font-family:'Share Tech Mono',monospace;background:#9146ff;color:#fff;border:none;border-radius:2px;cursor:pointer;letter-spacing:0.05em;">Connect with Twitch</button>
      <button id="cfg-disconnect-btn" onclick="disconnectTwitch()" style="padding:7px 16px;font-size:12px;font-family:'Share Tech Mono',monospace;background:transparent;color:#e88888;border:1px solid rgba(232,75,75,0.4);border-radius:2px;cursor:pointer;letter-spacing:0.05em;display:none;">Disconnect</button>
      <span id="cfg-auth-status" style="font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text-dim);"></span>
    </div>
  </div>

  <div class="cfg-section">
    <h2>Challenges <span style="font-size:11px;color:rgba(255,255,255,0.3);font-weight:400;">(weight = how likely to land, 1–9)</span></h2>
    <div id="items-cfg"></div>
    <button id="cfg-add-item" onclick="cfgAddItem()">+ Add challenge</button>
  </div>

  <div class="cfg-section">
    <h2>Sound</h2>
    <div class="cfg-row"><label>Sound effects</label><input type="text" id="cfg-sound" placeholder="on or off"/></div>
    <div class="cfg-row">
      <label>Volume</label>
      <input type="range" id="cfg-volume" min="0" max="100" step="1" value="70" style="flex:1;" oninput="document.getElementById('cfg-vol-out').textContent=this.value+'%'"/>
      <span id="cfg-vol-out" style="font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--accent);min-width:36px;text-align:right;">70%</span>
    </div>
  </div>

  <div>
    <button id="cfg-save" onclick="cfgSave()">Save &amp; apply</button>
    <button id="cfg-cancel" onclick="cfgClose()">Cancel</button>
    <button id="cfg-reset" onclick="cfgReset()" style="padding:10px 20px;font-size:12px;background:transparent;border:1px solid rgba(232,75,75,0.4);border-radius:2px;color:#e88888;cursor:pointer;font-family:'Share Tech Mono',monospace;margin-left:8px;">Reset to defaults</button>
    <div id="cfg-status">Saved!</div>
  </div>
</div>

<script>
// ============================================================
// DEFAULT CONFIG — edit here OR use ?config=1 in the browser
// ============================================================
const DEFAULTS = {
  channel: '',           // your Twitch channel name (lowercase)
  rewardFilter: '',      // reward title to listen for (blank = any)
  clientId: '',          // Twitch app Client ID from dev.twitch.tv
  oauthToken: '',        // auto-filled after connecting with Twitch
  soundEnabled: true,
  volume: 0.7,          // 0.0 to 1.0
  items: [
    { label: 'One eye closed',   color: '#1a2f4a', weight: 1 },
    { label: 'Switch mouse hands', color: '#1a4a1a', weight: 1 },
    { label: 'Sound off',        color: '#1a3a2a', weight: 1 },
    { label: 'Throw weapons',    color: '#3a2a10', weight: 1 },
    { label: 'CHARGE!!!!',       color: '#4a1a1a', weight: 1 },
    { label: 'Forget the W',     color: '#2a1a3a', weight: 1 },
    { label: 'Only walk',        color: '#4a2a10', weight: 1 },
    { label: 'Only crouch',      color: '#101a4a', weight: 1 },
    { label: 'Pick a corner',    color: '#1a4a3a', weight: 1 },
  ]
};
// ============================================================

let cfg = loadCfg();
let angle = 0;
let velocity = 0;
let spinning = false;
let raf = null;
let queue = [];
let ws = null;
let eventsubSessionId = null;
let twitchUserId = null;

function loadCfg() {
  try {
    const s = localStorage.getItem('wheelCfg');
    if (s) return Object.assign({}, DEFAULTS, JSON.parse(s));
  } catch(e) {}
  return Object.assign({}, DEFAULTS);
}

function saveCfg() {
  localStorage.setItem('wheelCfg', JSON.stringify(cfg));
}

// ---- Canvas drawing ----
const cvs = document.getElementById('wheel-canvas');
const ctx = cvs.getContext('2d');
const SIZE = 600;

function totalWeight() {
  return cfg.items.reduce((s, i) => s + (i.weight || 1), 0);
}

function drawWheel() {
  const items = cfg.items;
  const n = items.length;
  const cx = SIZE / 2, cy = SIZE / 2, r = SIZE / 2 - 4;
  ctx.clearRect(0, 0, SIZE, SIZE);

  if (!n) return;

  const tw = totalWeight();
  let cur = angle;

  for (let i = 0; i < n; i++) {
    const arc = ((items[i].weight || 1) / tw) * 2 * Math.PI;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, cur, cur + arc);
    ctx.closePath();
    ctx.fillStyle = items[i].color;
    ctx.fill();
    ctx.strokeStyle = 'rgba(232,184,75,0.3)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Label
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(cur + arc / 2);
    ctx.textAlign = 'right';
    const fz = n > 12 ? 11 : n > 8 ? 13 : 15;
    ctx.font = `700 ${fz}px 'Barlow Condensed', sans-serif`;
    ctx.fillStyle = '#fff';
    ctx.shadowColor = 'rgba(0,0,0,0.7)';
    ctx.shadowBlur = 4;
    let lbl = items[i].label;
    if (lbl.length > 18) lbl = lbl.slice(0, 17) + '…';
    ctx.fillText(lbl, r - 14, fz / 3);
    ctx.restore();

    cur += arc;
  }

  // Outer rim
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, 2 * Math.PI);
  ctx.strokeStyle = 'rgba(232,184,75,0.6)';
  ctx.lineWidth = 4;
  ctx.stroke();
}

function getWinner() {
  const items = cfg.items;
  const n = items.length;
  if (!n) return null;
  const tw = totalWeight();
  const norm = (((-angle) % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
  const frac = norm / (2 * Math.PI);
  let acc = 0;
  for (let i = 0; i < n; i++) {
    acc += (items[i].weight || 1) / tw;
    if (frac < acc) return items[i];
  }
  return items[n - 1];
}

// ---- Spin logic ----
function doSpin(redeemer) {
  if (spinning || cfg.items.length < 2) return;
  spinning = true;
  const hub = document.getElementById('spin-hub');
  hub.classList.add('disabled');
  document.getElementById('wheel-canvas').classList.add('spinning');
  const wc = document.getElementById('wheel-container');
  wc.classList.remove('hidden');
  wc.classList.add('visible');
  // Force redraw now that container is visible and has dimensions
  requestAnimationFrame(() => drawWheel());
  // Pick winner upfront so we can aim the wheel exactly at its slice
  const items = cfg.items;
  const tw = totalWeight();
  let roll = Math.random() * tw, acc = 0, winnerIdx = items.length - 1;
  for (let i = 0; i < items.length; i++) {
    acc += (items[i].weight || 1);
    if (roll < acc) { winnerIdx = i; break; }
  }

  // Find angular position of the winning slice
  let sliceStart = 0;
  for (let i = 0; i < winnerIdx; i++) sliceStart += ((items[i].weight||1)/tw) * 2 * Math.PI;
  const sliceArc = ((items[winnerIdx].weight||1)/tw) * 2 * Math.PI;
  // Land randomly within middle 60% of slice so it never sits right on an edge
  const landOffset = sliceArc * (0.2 + Math.random() * 0.6);
  const sliceMid = sliceStart + landOffset;

  // Random spin profile: determines rotations and duration
  const spinProfile = Math.random();
  const minRotations = spinProfile < 0.25 ? 3 + Math.floor(Math.random()*2)
                     : spinProfile < 0.6  ? 5 + Math.floor(Math.random()*3)
                     : spinProfile < 0.85 ? 7 + Math.floor(Math.random()*3)
                     :                     10 + Math.floor(Math.random()*3);

  // Solve for target: pointer reads at (-angle mod 2π) = sliceMid
  const currentNorm = ((-angle) % (2*Math.PI) + 2*Math.PI) % (2*Math.PI);
  let delta = sliceMid - currentNorm;
  if (delta <= 0) delta += 2*Math.PI;
  const targetAngle = angle - delta - minRotations * 2 * Math.PI;

  const duration = spinProfile < 0.25 ? 3500 + Math.random()*1000
                 : spinProfile < 0.6  ? 5000 + Math.random()*1500
                 : spinProfile < 0.85 ? 6500 + Math.random()*1500
                 :                      8500 + Math.random()*1500;

  const startAngle = angle;
  const startTime = performance.now();
  let flutterDone = false;

  function easeOut(t) {
    // Cubic ease-out with optional subtle flutter near the end
    if (!flutterDone && t > 0.85 && t < 0.93 && Math.random() < 0.003) flutterDone = true;
    if (flutterDone && t > 0.85 && t < 0.93) {
      const sub = (t - 0.85) / 0.08;
      return 1 - Math.pow(1 - t, 3) - Math.sin(sub * Math.PI) * 0.007;
    }
    return 1 - Math.pow(1 - t, 3);
  }

  // Track which slice the pointer is currently in to fire ticks on boundary crossings
  function getSliceIdx(a) {
    const tw2 = totalWeight();
    const norm = (((-a) % (2*Math.PI)) + 2*Math.PI) % (2*Math.PI);
    const frac = norm / (2*Math.PI);
    let acc = 0;
    for (let i = 0; i < items.length; i++) {
      acc += (items[i].weight||1) / tw2;
      if (frac < acc) return i;
    }
    return items.length - 1;
  }

  let lastSliceIdx = getSliceIdx(angle);

  function frame(now) {
    const elapsed = now - startTime;
    const t = Math.min(elapsed / duration, 1);
    angle = startAngle + (targetAngle - startAngle) * easeOut(t);
    drawWheel();

    // Tick once every time the pointer crosses into a new slice
    const currentSliceIdx = getSliceIdx(angle);
    if (currentSliceIdx !== lastSliceIdx) {
      if (cfg.soundEnabled) playTick();
      lastSliceIdx = currentSliceIdx;
    }

    if (t < 1) {
      raf = requestAnimationFrame(frame);
    } else {
      angle = targetAngle;
      drawWheel();
      spinning = false;
      hub.classList.remove('disabled');
      document.getElementById('wheel-canvas').classList.remove('spinning');
      if (cfg.soundEnabled) playWin();
      showResult(items[winnerIdx], redeemer);
      processQueue();
    }
  }
  raf = requestAnimationFrame(frame);
}

function manualSpin() {
  if (spinning) return;
  doSpin(null);
}

// ---- Queue ----
let lastRedemptionTime = 0;
function enqueue(user) {
  // Debounce — ignore duplicate events within 3 seconds
  const now = Date.now();
  if (now - lastRedemptionTime < 3000) {
    console.log('[Wheel] Debounced duplicate redemption from', user);
    return;
  }
  lastRedemptionTime = now;
  if (!spinning) {
    doSpin(user);
  } else {
    queue.push(user);
    updateQueuePill();
  }
}

function processQueue() {
  updateQueuePill();
  if (queue.length > 0 && !spinning) {
    const next = queue.shift();
    updateQueuePill();
    setTimeout(() => doSpin(next), 1000);
  }
}

function updateQueuePill() {
  const pill = document.getElementById('queue-pill');
  if (queue.length > 0) {
    pill.classList.add('show');
    document.getElementById('q-count').textContent = queue.length;
  } else {
    pill.classList.remove('show');
  }
}

// ---- Audio ----
let audioCtx = null;
let masterGain = null;
function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = cfg.volume ?? 0.7;
    masterGain.connect(audioCtx.destination);
  }
  return audioCtx;
}
function getMaster() {
  getAudioCtx();
  return masterGain;
}

function playTick() {
  try {
    const ac = getAudioCtx();
    const t = ac.currentTime;

    // CS2 bomb beep approximation:
    // Two rapid chirps ~80ms apart, each a short sine blip around 1050Hz
    // with a tiny frequency drop (pitch bends down slightly on each chirp)
    function chirp(offset) {
      const o = ac.createOscillator();
      const g = ac.createGain();
      const filter = ac.createBiquadFilter();
      filter.type = 'bandpass';
      filter.frequency.value = 1050;
      filter.Q.value = 8;
      o.type = 'sine';
      o.frequency.setValueAtTime(1080, t + offset);
      o.frequency.exponentialRampToValueAtTime(980, t + offset + 0.045);
      o.connect(filter); filter.connect(g); g.connect(getMaster());
      g.gain.setValueAtTime(0, t + offset);
      g.gain.linearRampToValueAtTime(0.28, t + offset + 0.003);
      g.gain.exponentialRampToValueAtTime(0.001, t + offset + 0.055);
      o.start(t + offset);
      o.stop(t + offset + 0.06);
    }

    chirp(0);
    chirp(0.075);
  } catch(e) {}
}

function playWin() {
  try {
    const ac = getAudioCtx();
    [523, 659, 784, 1047, 1319].forEach((f, i) => {
      const o = ac.createOscillator();
      const g = ac.createGain();
      o.connect(g); g.connect(getMaster());
      o.frequency.value = f; o.type = 'triangle';
      const t = ac.currentTime + i * 0.1;
      g.gain.setValueAtTime(0.12, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
      o.start(t); o.stop(t + 0.3);
    });
  } catch(e) {}
}

// ---- Twitch OAuth ----
function startTwitchAuth() {
  const clientId = document.getElementById('cfg-clientid').value.trim() || cfg.clientId;
  if (!clientId) { alert('Enter your Client ID first.'); return; }
  cfg.clientId = clientId;
  cfg.oauthToken = '';
  saveCfg();
  const scopes = 'channel:read:redemptions channel:manage:redemptions user:read:email';
  const redirectUri = window.location.origin + window.location.pathname.replace(/\/?$/, '/');
  const url = `https://id.twitch.tv/oauth2/authorize?client_id=${clientId}&redirect_uri=${encodeURIComponent(redirectUri)}&response_type=token&scope=${encodeURIComponent(scopes)}&force_verify=true`;
  const popup = window.open(url, 'twitch-auth', 'width=500,height=750,left=200,top=100');
  document.getElementById('cfg-auth-status').textContent = 'Waiting for Twitch login...';
  let handled = false;
  const poll = setInterval(() => {
    if (handled) return;
    try {
      const hash = popup.location.hash;
      if (hash && hash.includes('access_token')) {
        handled = true;
        clearInterval(poll);
        const token = new URLSearchParams(hash.replace('#', '?')).get('access_token');
        popup.close();
        onTokenReceived(token);
      }
    } catch(e) {}
    try {
      if (!popup || popup.closed) {
        clearInterval(poll);
        if (!handled) {
          // Popup closed without us catching the hash — check localStorage
          const saved = JSON.parse(localStorage.getItem('wheelCfg') || '{}');
          if (saved.oauthToken && saved.oauthToken !== cfg.oauthToken) {
            handled = true;
            onTokenReceived(saved.oauthToken);
          } else {
            document.getElementById('cfg-auth-status').textContent = 'Cancelled.';
          }
        }
      }
    } catch(e) {}
  }, 300);
}

function onTokenReceived(token) {
  cfg.oauthToken = token;
  saveCfg();
  fetch('https://id.twitch.tv/oauth2/validate', {
    headers: { 'Authorization': 'OAuth ' + token }
  }).then(r => r.json()).then(data => {
    if (data.login) {
      cfg.channel = data.login;
      saveCfg();
      document.getElementById('cfg-channel').value = data.login;
      document.getElementById('cfg-auth-status').textContent = 'Connected as ' + data.login;
    } else {
      document.getElementById('cfg-auth-status').textContent = 'Authorised!';
    }
    document.getElementById('cfg-auth-btn').textContent = 'Re-connect Twitch';
    document.getElementById('cfg-auth-btn').style.background = '#1e9e75';
    document.getElementById('cfg-disconnect-btn').style.display = 'inline-block';
    connectTwitch();
  }).catch(() => {
    document.getElementById('cfg-auth-status').textContent = 'Authorised!';
    document.getElementById('cfg-auth-btn').textContent = 'Re-connect Twitch';
    document.getElementById('cfg-auth-btn').style.background = '#1e9e75';
    document.getElementById('cfg-disconnect-btn').style.display = 'inline-block';
    connectTwitch();
  });
}

// ---- Twitch EventSub WebSocket ----
function connectTwitch() {
  if (!cfg.oauthToken || !cfg.clientId) {
    console.log('[Wheel] Missing token or clientId');
    return;
  }
  if (ws) { ws.onclose = null; ws.onerror = null; ws.close(); ws = null; }
  console.log('[Wheel] Connecting to EventSub...');
  openEventSubSocket();
}

function openEventSubSocket(url) {
  ws = new WebSocket(url || 'wss://eventsub.wss.twitch.tv/ws');

  ws.onmessage = async e => {
    try {
      const msg = JSON.parse(e.data);
      const type = msg.metadata?.message_type;
      console.log('[Wheel] WS message type:', type);
      window._debug('WS msg: ' + type);

      if (type === 'session_welcome') {
        eventsubSessionId = msg.payload.session.id;
        console.log('[Wheel] Session ID:', eventsubSessionId);
        window._debug('Session: ' + eventsubSessionId);
        await resolveUserId();
      }

      if (type === 'session_reconnect') {
        console.log('[Wheel] Reconnecting...');
        const newUrl = msg.payload.session.reconnect_url;
        ws.onclose = null;
        ws.close();
        openEventSubSocket(newUrl);
      }

      if (type === 'notification') {
        const evt = msg.payload.event;
        console.log('[Wheel] Notification event:', JSON.stringify(evt));
        window._debug('Event: ' + JSON.stringify(evt).slice(0, 120));
        if (!evt) return;
        const rewardTitle = (evt.reward?.title || '').toLowerCase().trim();
        const filter = (cfg.rewardFilter || '').toLowerCase().trim();
        console.log('[Wheel] rewardTitle:', rewardTitle, 'filter:', filter);
        window._debug('reward:"' + rewardTitle + '" filter:"' + filter + '"');
        if (!filter || rewardTitle.includes(filter) || filter.includes(rewardTitle)) {
          const user = evt.user_name || evt.user_login || 'viewer';
          console.log('[Wheel] Enqueuing spin for:', user);
          window._debug('SPIN: ' + user);
          enqueue(user);
        } else {
          console.log('[Wheel] No match, skipping');
          window._debug('NO MATCH');
        }
      }
    } catch(ex) {
      console.error('[Wheel] Message error:', ex);
      window._debug('ERROR: ' + ex.message);
    }
  };

  ws.onerror = e => console.error('[Wheel] WS error:', e);
  ws.onclose = e => {
    console.log('[Wheel] WS closed, code:', e.code, 'clean:', e.wasClean);
    window._debug('WS closed code:' + e.code);
    // Auto-reconnect after 10s on unexpected close (not code 4003 which means auth failed)
    if (e.code !== 1000 && e.code !== 4003) setTimeout(() => openEventSubSocket(), 10000);
  };
}

async function resolveUserId() {
  try {
    // First validate token and log scopes
    const valRes = await fetch('https://id.twitch.tv/oauth2/validate', {
      headers: { 'Authorization': 'OAuth ' + cfg.oauthToken }
    });
    const valData = await valRes.json();
    console.log('[Wheel] Token validation:', JSON.stringify(valData));
    window._debug('Scopes: ' + (valData.scopes||[]).join(', '));

    const channelName = cfg.channel.trim().toLowerCase();
    if (!channelName) { console.log('[Wheel] No channel set'); return; }
    console.log('[Wheel] Resolving user ID for:', channelName);
    window._debug('Resolving: ' + channelName);
    const res = await fetch(`https://api.twitch.tv/helix/users?login=${channelName}`, {
      headers: { 'Client-Id': cfg.clientId, 'Authorization': `Bearer ${cfg.oauthToken}` }
    });
    const data = await res.json();
    console.log('[Wheel] Users response:', JSON.stringify(data));
    window._debug('Users API: ' + JSON.stringify(data).slice(0,80));
    if (!data.data?.length) { console.log('[Wheel] Channel not found'); return; }
    twitchUserId = data.data[0].id;
    console.log('[Wheel] User ID:', twitchUserId);
    window._debug('UserID: ' + twitchUserId);
    await subscribeEventSub();
  } catch(e) {
    console.error('[Wheel] resolveUserId error:', e);
    window._debug('resolveUserId ERROR: ' + e.message);
  }
}

async function subscribeEventSub() {
  try {
    const body = {
      type: 'channel.channel_points_custom_reward_redemption.add',
      version: '1',
      condition: { broadcaster_user_id: twitchUserId },
      transport: { method: 'websocket', session_id: eventsubSessionId }
    };
    console.log('[Wheel] Subscribing EventSub:', JSON.stringify(body));
    window._debug('Subscribing EventSub...');
    const res = await fetch('https://api.twitch.tv/helix/eventsub/subscriptions', {
      method: 'POST',
      headers: {
        'Client-Id': cfg.clientId,
        'Authorization': `Bearer ${cfg.oauthToken}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    console.log('[Wheel] Subscribe response', res.status, JSON.stringify(data));
    window._debug('Subscribe ' + res.status + ': ' + JSON.stringify(data).slice(0,80));
  } catch(e) {
    console.error('[Wheel] subscribeEventSub error:', e);
    window._debug('Subscribe ERROR: ' + e.message);
  }
}

async function validateToken(token, statusEl) {
  try {
    const res = await fetch('https://id.twitch.tv/oauth2/validate', {
      headers: { 'Authorization': 'OAuth ' + token }
    });
    const data = await res.json();
    if (!res.ok) {
      statusEl.textContent = 'Token invalid — reconnect Twitch.';
      statusEl.style.color = '#e84b4b';
      return;
    }
    const scopes = data.scopes || [];
    const hasScope = scopes.includes('channel:read:redemptions');
    if (hasScope) {
      statusEl.textContent = 'Token OK · scopes: ' + scopes.join(', ');
      statusEl.style.color = '#5dca5d';
    } else {
      statusEl.textContent = 'Missing scope! Disconnect and reconnect Twitch.';
      statusEl.style.color = '#e84b4b';
    }
    console.log('[Wheel] Token scopes:', scopes);
  } catch(e) {
    statusEl.textContent = 'Could not validate token.';
  }
}

// ---- Drag to move ----
function makeDraggable(el) {
  el.addEventListener('mousedown', e => {
    if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') return;
    e.preventDefault();
    const rect = el.getBoundingClientRect();
    // Switch from right-based to left-based positioning for dragging
    el.style.right = 'auto';
    el.style.left = rect.left + 'px';
    el.style.top = rect.top + 'px';
    const startX = e.clientX, startY = e.clientY;
    const origX = rect.left, origY = rect.top;
    el.classList.add('dragging');
    function onMove(e) {
      el.style.left = (origX + e.clientX - startX) + 'px';
      el.style.top  = (origY + e.clientY - startY) + 'px';
    }
    function onUp() {
      el.classList.remove('dragging');
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

makeDraggable(document.getElementById('result-overlay'));

// Keyboard shortcut: press S to spin manually (useful when testing)
document.addEventListener('keydown', e => {
  const configOpen = document.getElementById('config-panel').classList.contains('open');
  const typing = ['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName) || e.target.isContentEditable;
  if (configOpen || typing) return;
  if (e.key === 's' || e.key === 'S') { e.preventDefault(); manualSpin(); }
  if (e.key === 'Escape') closeResult();
  if (e.key === 'c' || e.key === 'C') { e.preventDefault(); openConfig(); }
});
</script>
</body>
