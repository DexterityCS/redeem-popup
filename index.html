<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS2 Challenge Wheel</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cs-green: #4a5c3a; --cs-dark: #1a1f14; --cs-darker: #0d1009;
    --cs-yellow: #e8b84b; --cs-red: #c0392b; --cs-blue: #2980b9;
    --cs-light: #c8d4b8; --cs-gray: #3a4030;
  }
  html, body { width:100%; height:100%; background:transparent; overflow:hidden; }
  #scene { position:fixed; inset:0; pointer-events:none; background:transparent; }

  #wheel-wrap {
    position:absolute; width:480px; display:none; flex-direction:column;
    align-items:center; cursor:grab; pointer-events:auto; user-select:none;
    right:80px; top:50%; transform:translateY(-50%);
  }
  #wheel-wrap.visible { display:flex; }
  #wheel-wrap:active { cursor:grabbing; }
  .wheel-outer { position:relative; width:420px; height:420px; }
  #wheel-canvas { width:420px; height:420px; border-radius:50%; display:block; }
  .wheel-pointer {
    position:absolute; top:-18px; left:50%; transform:translateX(-50%);
    width:0; height:0; border-left:14px solid transparent;
    border-right:14px solid transparent; border-top:32px solid var(--cs-yellow);
    filter:drop-shadow(0 0 8px var(--cs-yellow)); z-index:10;
  }
  .wheel-hub {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:60px; height:60px; border-radius:50%; background:var(--cs-darker);
    border:3px solid var(--cs-yellow); display:flex; align-items:center;
    justify-content:center; font-family:'Orbitron',monospace; font-size:10px;
    font-weight:700; color:var(--cs-yellow); letter-spacing:1px; z-index:10;
    transition:opacity 0.3s; text-align:center; line-height:1.1;
  }
  #spin-hub.hidden { opacity:0; }

  #result-card {
    position:absolute; width:420px; display:none; flex-direction:column;
    background:var(--cs-darker); border:2px solid var(--cs-yellow);
    cursor:grab; pointer-events:auto; user-select:none; right:80px; top:40px;
  }
  #result-card.visible { display:flex; }
  #result-card:active { cursor:grabbing; }
  .result-header {
    background:var(--cs-yellow); padding:10px 16px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .result-header-title { font-family:'Orbitron',monospace; font-size:12px; font-weight:900; color:var(--cs-darker); letter-spacing:2px; }
  .result-countdown { font-family:'Share Tech Mono',monospace; font-size:12px; color:var(--cs-darker); opacity:0.7; }
  .result-body { padding:20px 24px; }
  .result-winner { font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--cs-blue); letter-spacing:1px; margin-bottom:6px; text-transform:uppercase; }
  .result-challenge { font-family:'Orbitron',monospace; font-size:20px; font-weight:700; color:var(--cs-yellow); text-transform:uppercase; letter-spacing:1px; line-height:1.3; }
  .result-dismiss {
    background:none; border:1px solid var(--cs-yellow); color:var(--cs-yellow);
    font-family:'Share Tech Mono',monospace; font-size:11px; padding:6px 16px;
    cursor:pointer; margin:0 24px 16px auto; display:block; transition:background 0.2s;
  }
  .result-dismiss:hover { background:rgba(232,184,75,0.15); }

  #config-overlay {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85);
    z-index:1000; align-items:center; justify-content:center; pointer-events:auto;
  }
  #config-overlay.open { display:flex; }
  #config-panel {
    background:var(--cs-darker); border:2px solid var(--cs-yellow);
    width:560px; max-height:85vh; overflow-y:auto; padding:28px;
    font-family:'Share Tech Mono',monospace; color:var(--cs-light); position:relative;
  }
  .cfg-title { font-family:'Orbitron',monospace; font-size:18px; font-weight:900; color:var(--cs-yellow); letter-spacing:3px; margin-bottom:24px; text-align:center; }
  .cfg-section { margin-bottom:20px; border:1px solid var(--cs-gray); padding:14px; }
  .cfg-section-title { font-size:10px; color:var(--cs-yellow); letter-spacing:2px; text-transform:uppercase; margin-bottom:12px; }
  .cfg-field { margin-bottom:10px; }
  .cfg-label { font-size:10px; color:#8a9a7a; letter-spacing:1px; display:block; margin-bottom:4px; }
  .cfg-input { width:100%; background:var(--cs-dark); border:1px solid var(--cs-gray); color:var(--cs-light); font-family:'Share Tech Mono',monospace; font-size:13px; padding:7px 10px; outline:none; }
  .cfg-input:focus { border-color:var(--cs-yellow); }
  .cfg-item-row { display:flex; gap:8px; align-items:center; margin-bottom:6px; }
  .cfg-item-color { width:28px; height:28px; border:1px solid var(--cs-gray); cursor:pointer; padding:2px; background:var(--cs-dark); }
  .cfg-item-name { flex:1; background:var(--cs-dark); border:1px solid var(--cs-gray); color:var(--cs-light); font-family:'Share Tech Mono',monospace; font-size:12px; padding:5px 8px; outline:none; }
  .cfg-item-name:focus { border-color:var(--cs-yellow); }
  .cfg-item-weight { width:44px; background:var(--cs-dark); border:1px solid var(--cs-gray); color:var(--cs-yellow); font-family:'Share Tech Mono',monospace; font-size:12px; padding:5px 6px; text-align:center; outline:none; }
  .cfg-item-del { background:none; border:1px solid var(--cs-red); color:var(--cs-red); cursor:pointer; width:28px; height:28px; font-size:16px; line-height:1; }
  .cfg-item-del:hover { background:rgba(192,57,43,0.2); }
  .cfg-btn { background:none; border:1px solid var(--cs-yellow); color:var(--cs-yellow); font-family:'Share Tech Mono',monospace; font-size:11px; padding:7px 16px; cursor:pointer; letter-spacing:1px; transition:background 0.2s; }
  .cfg-btn:hover { background:rgba(232,184,75,0.15); }
  .cfg-btn.danger { border-color:var(--cs-red); color:var(--cs-red); }
  .cfg-btn.danger:hover { background:rgba(192,57,43,0.2); }
  .cfg-btn.success { border-color:#4caf50; color:#4caf50; }
  .cfg-row { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
  .cfg-volume-row { display:flex; align-items:center; gap:10px; }
  .cfg-volume-slider { flex:1; accent-color:var(--cs-yellow); }
  .cfg-volume-val { font-size:12px; color:var(--cs-yellow); min-width:36px; }
  .twitch-status { font-size:11px; margin-top:6px; padding:6px 10px; background:var(--cs-dark); border-left:3px solid var(--cs-gray); }
  .twitch-status.ok { border-color:#4caf50; color:#4caf50; }
  .twitch-status.err { border-color:var(--cs-red); color:var(--cs-red); }
  .twitch-status.warn { border-color:var(--cs-yellow); color:var(--cs-yellow); }
</style>
</head>
<body>
<div id="scene">
  <div id="result-card">
    <div class="result-header">
      <span class="result-header-title">✷ CHALLENGE SELECTED ✷</span>
      <span class="result-countdown" id="result-countdown"></span>
    </div>
    <div class="result-body">
      <div class="result-winner" id="result-winner"></div>
      <div class="result-challenge" id="result-text"></div>
    </div>
    <button class="result-dismiss" id="result-dismiss-btn">Confirm [ESC]</button>
  </div>
  <div id="wheel-wrap">
    <div class="wheel-outer">
      <div class="wheel-pointer"></div>
      <canvas id="wheel-canvas" width="420" height="420"></canvas>
      <div class="wheel-hub" id="spin-hub">SPIN</div>
    </div>
  </div>
</div>

<div id="config-overlay">
  <div id="config-panel">
    <div class="cfg-title">// WHEEL CONFIG //</div>
    <div class="cfg-section">
      <div class="cfg-section-title">Twitch Integration</div>
      <div class="cfg-field"><label class="cfg-label">Client ID (from dev.twitch.tv)</label><input class="cfg-input" id="cfg-clientid" placeholder="paste your Twitch app Client ID"></div>
      <div class="cfg-field"><label class="cfg-label">Channel name</label><input class="cfg-input" id="cfg-channel" placeholder="auto-filled after connecting"></div>
      <div class="cfg-field"><label class="cfg-label">Channel Points reward name</label><input class="cfg-input" id="cfg-reward" placeholder="e.g. Spin the Wheel (must match your reward name exactly)"></div>
      <div class="cfg-row">
        <button class="cfg-btn" id="twitch-connect-btn">Connect with Twitch</button>
        <button class="cfg-btn danger" id="twitch-disconnect-btn" style="display:none;">Disconnect</button>
      </div>
      <div class="twitch-status" id="twitch-status-cfg">Not connected</div>
    </div>
    <div class="cfg-section">
      <div class="cfg-section-title">Sound Effects</div>
      <div class="cfg-field"><label class="cfg-label" style="display:flex;align-items:center;gap:8px;cursor:pointer;"><input type="checkbox" id="cfg-sound" checked style="accent-color:var(--cs-yellow);"> Enable sound</label></div>
      <div class="cfg-field"><label class="cfg-label">Volume</label><div class="cfg-volume-row"><input type="range" min="0" max="100" value="70" class="cfg-volume-slider" id="cfg-volume"><span class="cfg-volume-val" id="cfg-volume-val">70%</span></div></div>
    </div>
    <div class="cfg-section">
      <div class="cfg-section-title">Challenges</div>
      <div id="cfg-items-list"></div>
      <div class="cfg-row" style="margin-top:10px;">
        <button class="cfg-btn" id="cfg-add-item">+ Add challenge</button>
        <button class="cfg-btn danger" id="cfg-reset-defaults">Reset to defaults</button>
      </div>
    </div>
    <div class="cfg-row" style="justify-content:center;margin-top:16px;">
      <button class="cfg-btn" id="cfg-save-btn" style="font-size:13px;padding:10px 32px;">Save &amp; apply</button>
      <button class="cfg-btn danger" id="cfg-cancel-btn">Cancel</button>
    </div>
  </div>
</div>

<script>
const DEFAULTS = {
  clientId:'', channel:'', rewardFilter:'', soundEnabled:true, volume:70,
  items:[
    {label:'One eye closed',    color:'#2d3a22',weight:1},
    {label:'Switch mouse hands',color:'#3a4a2a',weight:1},
    {label:'Sound off',         color:'#4a5c3a',weight:1},
    {label:'Throw weapons',     color:'#556840',weight:1},
    {label:'CHARGE!!!!',        color:'#3d4e2d',weight:1},
    {label:'Forget the W',      color:'#4f6237',weight:1},
    {label:'Only walk',         color:'#38492a',weight:1},
    {label:'Only crouch',       color:'#516040',weight:1},
    {label:'Pick a corner',     color:'#435535',weight:1},
  ]
};

let cfg=loadCfg(), spinning=false, currentAngle=0, spinQueue=[], dismissInterval=null;

function loadCfg(){try{const s=localStorage.getItem('wheelCfg');if(s)return{...DEFAULTS,...JSON.parse(s)};}catch(e){}return{...DEFAULTS,items:DEFAULTS.items.map(i=>({...i}))}}
function saveCfg(){localStorage.setItem('wheelCfg',JSON.stringify(cfg));}

const audioCtx=new(window.AudioContext||window.webkitAudioContext)();
let masterGain;
function ensureAudio(){if(!masterGain){masterGain=audioCtx.createGain();masterGain.gain.value=cfg.volume/100;masterGain.connect(audioCtx.destination);}}
function playTick(){
  if(!cfg.soundEnabled)return; ensureAudio();
  const t=audioCtx.currentTime;
  [0,0.075].forEach(off=>{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain(),f=audioCtx.createBiquadFilter();
    f.type='bandpass';f.frequency.value=1080;f.Q.value=3;
    o.type='sine';o.frequency.setValueAtTime(1080,t+off);o.frequency.linearRampToValueAtTime(980,t+off+0.05);
    g.gain.setValueAtTime(0,t+off);g.gain.linearRampToValueAtTime(0.5*(cfg.volume/100),t+off+0.004);
    g.gain.exponentialRampToValueAtTime(0.001,t+off+0.12);
    o.connect(f);f.connect(g);g.connect(audioCtx.destination);
    o.start(t+off);o.stop(t+off+0.13);
  });
}
function playWin(){
  if(!cfg.soundEnabled)return; ensureAudio();
  const t=audioCtx.currentTime;
  [0,0.15,0.3,0.5].forEach((off,i)=>{
    const freqs=[880,1108,1318,1760];
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type='sine';o.frequency.value=freqs[i];
    g.gain.setValueAtTime(0,t+off);g.gain.linearRampToValueAtTime(0.3*(cfg.volume/100),t+off+0.01);
    g.gain.exponentialRampToValueAtTime(0.001,t+off+0.35);
    o.connect(g);g.connect(audioCtx.destination);o.start(t+off);o.stop(t+off+0.4);
  });
}

const canvas=document.getElementById('wheel-canvas'),ctx2=canvas.getContext('2d');
const W=420,CX=W/2,CY=W/2,R=W/2-8;

function buildSlices(){const s=[];cfg.items.forEach(i=>{for(let w=0;w<i.weight;w++)s.push(i);});return s;}

function drawWheel(angle){
  const slices=buildSlices(),n=slices.length,arc=(2*Math.PI)/n;
  ctx2.clearRect(0,0,W,W);
  ctx2.beginPath();ctx2.arc(CX,CY,R+6,0,2*Math.PI);ctx2.strokeStyle='#e8b84b';ctx2.lineWidth=3;ctx2.stroke();
  ctx2.beginPath();ctx2.arc(CX,CY,R+10,0,2*Math.PI);ctx2.strokeStyle='#3a4030';ctx2.lineWidth=2;ctx2.stroke();
  slices.forEach((slice,i)=>{
    const s=angle+i*arc,e=s+arc;
    ctx2.beginPath();ctx2.moveTo(CX,CY);ctx2.arc(CX,CY,R,s,e);ctx2.closePath();
    ctx2.fillStyle=slice.color;ctx2.fill();ctx2.strokeStyle='#1a1f14';ctx2.lineWidth=1.5;ctx2.stroke();
    ctx2.save();ctx2.translate(CX,CY);ctx2.rotate(s+arc/2);ctx2.textAlign='right';
    ctx2.fillStyle='#e8c87a';ctx2.font=`bold ${n>10?11:13}px 'Barlow Condensed',sans-serif`;
    ctx2.shadowColor='#000';ctx2.shadowBlur=4;
    let lbl=slice.label.length>16?slice.label.slice(0,15)+'…':slice.label;
    ctx2.fillText(lbl,R-12,5);ctx2.restore();
  });
}

function doSpin(redeemerName){
  if(spinning){spinQueue.push(redeemerName);return;}
  spinning=true;
  const wrap=document.getElementById('wheel-wrap');
  wrap.classList.add('visible');
  requestAnimationFrame(()=>drawWheel(currentAngle));

  const slices=buildSlices(),n=slices.length,arc=(2*Math.PI)/n;
  const winIdx=Math.floor(Math.random()*n),winner=slices[winIdx];
  const profiles=[
    {minR:3,maxR:5,minD:3500,maxD:4500},{minR:5,maxR:8,minD:5000,maxD:6500},
    {minR:7,maxR:10,minD:6500,maxD:8000},{minR:10,maxR:14,minD:8000,maxD:10000}
  ];
  const p=profiles[Math.floor(Math.random()*profiles.length)];
  const extraRot=p.minR+Math.random()*(p.maxR-p.minR);
  const duration=p.minD+Math.random()*(p.maxD-p.minD);
  const sliceCenter=winIdx*arc+arc/2;
  const targetAngle=(2*Math.PI*extraRot)-sliceCenter+(Math.PI*1.5);
  const startAngle=currentAngle;
  const totalDelta=targetAngle-(startAngle%(2*Math.PI));
  const finalAngle=startAngle+totalDelta+Math.floor(extraRot)*2*Math.PI;
  const startTime=performance.now();
  let lastSliceIdx=-1;
  function easeOut(t){return 1-Math.pow(1-t,3);}
  function animate(now){
    const elapsed=now-startTime,t=Math.min(elapsed/duration,1),ease=easeOut(t);
    currentAngle=startAngle+(finalAngle-startAngle)*ease;
    const si=Math.floor(((currentAngle%(2*Math.PI))+2*Math.PI)%(2*Math.PI)/arc);
    if(si!==lastSliceIdx){playTick();lastSliceIdx=si;}
    drawWheel(currentAngle);
    if(t<1){requestAnimationFrame(animate);}
    else{
      currentAngle=finalAngle;drawWheel(currentAngle);
      document.getElementById('spin-hub').classList.add('hidden');
      spinning=false;playWin();
      const delay=5000+Math.random()*5000;
      setTimeout(()=>showResult(winner,redeemerName),delay);
    }
  }
  requestAnimationFrame(animate);
}

function showResult(winner,redeemerName){
  const card=document.getElementById('result-card');
  document.getElementById('result-text').textContent=winner.label;
  document.getElementById('result-winner').textContent=redeemerName?`// REDEEMED BY: ${redeemerName.toUpperCase()} //`:'';
  card.classList.add('visible');
  setTimeout(()=>document.getElementById('wheel-wrap').classList.remove('visible'),1000);
  let secsLeft=Math.round(5+Math.random()*5);
  function upd(){
    document.getElementById('result-dismiss-btn').textContent=`Confirm [ESC] (${secsLeft}s)`;
    document.getElementById('result-countdown').textContent=`${secsLeft}s`;
  }
  upd();
  dismissInterval=setInterval(()=>{secsLeft--;upd();if(secsLeft<=0)closeResult();},1000);
}

function closeResult(){
  clearInterval(dismissInterval);dismissInterval=null;
  document.getElementById('result-card').classList.remove('visible');
  document.getElementById('spin-hub').classList.remove('hidden');
  drawWheel(currentAngle);
  if(spinQueue.length>0){const next=spinQueue.shift();setTimeout(()=>doSpin(next),800);}
}

function makeDraggable(el){
  let sx,sy,sl,st;
  el.addEventListener('mousedown',e=>{
    if(e.target.tagName==='BUTTON'||e.target.tagName==='INPUT')return;
    e.preventDefault();
    const r=el.getBoundingClientRect();
    sx=e.clientX;sy=e.clientY;sl=r.left;st=r.top;
    el.style.right='auto';el.style.left=sl+'px';el.style.top=st+'px';el.style.transform='none';
    function mv(e){el.style.left=(sl+e.clientX-sx)+'px';el.style.top=(st+e.clientY-sy)+'px';}
    function up(){document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);}
    document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);
  });
}
makeDraggable(document.getElementById('wheel-wrap'));
makeDraggable(document.getElementById('result-card'));

document.addEventListener('keydown',e=>{
  const cfgOpen=document.getElementById('config-overlay').classList.contains('open');
  const typing=e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.isContentEditable;
  if(cfgOpen||typing)return;
  if(e.key==='s'||e.key==='S')doSpin('');
  if(e.key==='c'||e.key==='C')openConfig();
  if(e.key==='Escape')closeResult();
});
document.getElementById('result-dismiss-btn').addEventListener('click',closeResult);

let ws=null,wsIntentionalClose=false,reconnectTimer=null;
function setStatusCfg(msg,type=''){const el=document.getElementById('twitch-status-cfg');if(!el)return;el.textContent=msg;el.className='twitch-status'+(type?' '+type:'');}

function connectTwitch(){
  if(!cfg.clientId||!cfg.oauthToken)return;
  if(ws){wsIntentionalClose=true;ws.close();ws=null;}
  clearTimeout(reconnectTimer);
  ws=new WebSocket('wss://eventsub.wss.twitch.tv/ws');
  wsIntentionalClose=false;
  ws.onopen=()=>setStatusCfg('Connecting to EventSub...','warn');
  ws.onmessage=async(event)=>{
    const msg=JSON.parse(event.data),type=msg.metadata?.message_type;
    if(type==='session_welcome'){
      const sessionId=msg.payload.session.id;
      try{
        const res=await fetch(`https://api.twitch.tv/helix/users?login=${cfg.channel}`,{headers:{'Authorization':`Bearer ${cfg.oauthToken}`,'Client-Id':cfg.clientId}});
        const data=await res.json();
        if(!data.data?.[0]){setStatusCfg('Channel not found','err');return;}
        const userId=data.data[0].id;
        const subRes=await fetch('https://api.twitch.tv/helix/eventsub/subscriptions',{
          method:'POST',
          headers:{'Authorization':`Bearer ${cfg.oauthToken}`,'Client-Id':cfg.clientId,'Content-Type':'application/json'},
          body:JSON.stringify({type:'channel.channel_points_custom_reward_redemption.add',version:'1',condition:{broadcaster_user_id:userId},transport:{method:'websocket',session_id:sessionId}})
        });
        const subData=await subRes.json();
        if(subRes.ok)setStatusCfg(`Connected · #${cfg.channel}`,'ok');
        else setStatusCfg(`EventSub error: ${subData.message}`,'err');
      }catch(e){setStatusCfg('Connection error','err');}
    }
    if(type==='notification'){
      const evt=msg.payload?.event;if(!evt)return;
      const rt=(evt.reward?.title||evt.reward_title||'').toLowerCase();
      const f=(cfg.rewardFilter||'').toLowerCase().trim();
      if(!f||rt.includes(f)||f.includes(rt))doSpin(evt.user_name||evt.user_login||'');
    }
  };
  ws.onclose=e=>{if(wsIntentionalClose)return;if(e.code===4003){setStatusCfg('Auth error — reconnect Twitch','err');return;}setStatusCfg('Disconnected — reconnecting...','warn');reconnectTimer=setTimeout(connectTwitch,5000);};
  ws.onerror=()=>setStatusCfg('Connection error','err');
}

function startTwitchAuth(){
  if(!cfg.clientId){alert('Enter your Client ID first');return;}
  const redirectUri=window.location.origin+window.location.pathname;
  const scope='channel:read:redemptions channel:manage:redemptions user:read:email';
  const url=`https://id.twitch.tv/oauth2/authorize?client_id=${cfg.clientId}&redirect_uri=${encodeURIComponent(redirectUri)}&response_type=token&scope=${encodeURIComponent(scope)}&force_verify=true`;
  const popup=window.open(url,'twitch-auth','width=500,height=700');
  let handled=false;
  function onTokenReceived(token){
    if(handled)return;handled=true;
    cfg.oauthToken=token;saveCfg();updateConnectBtn();connectTwitchAndValidate();
    clearInterval(poll);setStatusCfg('Token received — connecting...','warn');
  }
  const poll=setInterval(()=>{
    try{
      if(popup.closed){clearInterval(poll);return;}
      const hash=popup.location.hash;
      if(hash&&hash.includes('access_token=')){
        const token=hash.match(/access_token=([^&]+)/)?.[1];
        if(token){popup.close();onTokenReceived(token);}
      }
    }catch(e){}
  },300);
}

async function connectTwitchAndValidate(){
  if(!cfg.oauthToken)return;
  try{
    const res=await fetch('https://id.twitch.tv/oauth2/validate',{headers:{'Authorization':`OAuth ${cfg.oauthToken}`}});
    const data=await res.json();
    if(data.login){cfg.channel=data.login;saveCfg();const c=document.getElementById('cfg-channel');if(c)c.value=cfg.channel;}
  }catch(e){}
  connectTwitch();
}

function disconnectTwitch(){
  cfg.oauthToken='';saveCfg();wsIntentionalClose=true;
  if(ws){ws.close();ws=null;}clearTimeout(reconnectTimer);
  updateConnectBtn();setStatusCfg('Disconnected','');
}

function updateConnectBtn(){
  const cb=document.getElementById('twitch-connect-btn'),db=document.getElementById('twitch-disconnect-btn');
  if(!cb)return;
  if(cfg.oauthToken){cb.textContent='Reconnect Twitch';cb.className='cfg-btn success';db.style.display='';}
  else{cb.textContent='Connect with Twitch';cb.className='cfg-btn';db.style.display='none';}
}

// Handle OAuth redirect
(function checkOAuth(){
  const hash=window.location.hash;
  if(hash&&hash.includes('access_token=')){
    const token=hash.match(/access_token=([^&]+)/)?.[1];
    if(token){
      let c={};try{c=JSON.parse(localStorage.getItem('wheelCfg'))||{};}catch(e){}
      c.oauthToken=token;localStorage.setItem('wheelCfg',JSON.stringify(c));
      document.body.innerHTML=`<div style="background:#0d1009;color:#e8b84b;font-family:'Orbitron',monospace;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-size:20px;letter-spacing:3px;text-align:center;">✓ TWITCH CONNECTED<br><span style="font-size:12px;color:#c8d4b8;font-family:'Share Tech Mono';margin-top:12px;display:block;">This window will close automatically...</span></div>`;
      window.history.replaceState({},document.title,window.location.pathname);
      setTimeout(()=>window.close(),2000);return;
    }
  }
})();

function openConfig(){
  cfg=loadCfg();
  document.getElementById('config-overlay').classList.add('open');
  document.getElementById('cfg-clientid').value=cfg.clientId||'';
  document.getElementById('cfg-channel').value=cfg.channel||'';
  document.getElementById('cfg-reward').value=cfg.rewardFilter||'';
  document.getElementById('cfg-sound').checked=cfg.soundEnabled!==false;
  document.getElementById('cfg-volume').value=cfg.volume??70;
  document.getElementById('cfg-volume-val').textContent=(cfg.volume??70)+'%';
  updateConnectBtn();renderItems();
}

function renderItems(){
  const list=document.getElementById('cfg-items-list');list.innerHTML='';
  cfg.items.forEach((item,i)=>{
    const row=document.createElement('div');row.className='cfg-item-row';
    row.innerHTML=`<input type="color" class="cfg-item-color" value="${item.color}" data-idx="${i}"><input type="text" class="cfg-item-name" value="${item.label}" placeholder="Challenge name" data-idx="${i}"><input type="number" class="cfg-item-weight" value="${item.weight}" min="1" max="9" data-idx="${i}" title="Weight"><button class="cfg-item-del" data-idx="${i}">×</button>`;
    list.appendChild(row);
  });
  list.querySelectorAll('.cfg-item-color').forEach(el=>el.addEventListener('input',e=>{cfg.items[+e.target.dataset.idx].color=e.target.value;drawWheel(currentAngle);}));
  list.querySelectorAll('.cfg-item-name').forEach(el=>el.addEventListener('input',e=>{cfg.items[+e.target.dataset.idx].label=e.target.value;drawWheel(currentAngle);}));
  list.querySelectorAll('.cfg-item-weight').forEach(el=>el.addEventListener('input',e=>{cfg.items[+e.target.dataset.idx].weight=Math.max(1,Math.min(9,+e.target.value||1));drawWheel(currentAngle);}));
  list.querySelectorAll('.cfg-item-del').forEach(el=>el.addEventListener('click',e=>{cfg.items.splice(+e.target.dataset.idx,1);renderItems();drawWheel(currentAngle);}));
}

document.getElementById('cfg-volume').addEventListener('input',e=>{document.getElementById('cfg-volume-val').textContent=e.target.value+'%';});
document.getElementById('cfg-add-item').addEventListener('click',()=>{cfg.items.push({label:'New challenge',color:'#3a4a2a',weight:1});renderItems();});
document.getElementById('cfg-reset-defaults').addEventListener('click',()=>{if(!confirm('Reset all challenges to defaults?'))return;cfg.items=DEFAULTS.items.map(i=>({...i}));localStorage.removeItem('wheelCfg');renderItems();drawWheel(currentAngle);});
document.getElementById('twitch-connect-btn').addEventListener('click',startTwitchAuth);
document.getElementById('twitch-disconnect-btn').addEventListener('click',disconnectTwitch);
document.getElementById('cfg-save-btn').addEventListener('click',()=>{
  cfg.clientId=document.getElementById('cfg-clientid').value.trim();
  cfg.channel=document.getElementById('cfg-channel').value.trim().toLowerCase();
  cfg.rewardFilter=document.getElementById('cfg-reward').value.trim();
  cfg.soundEnabled=document.getElementById('cfg-sound').checked;
  cfg.volume=parseInt(document.getElementById('cfg-volume').value);
  if(masterGain)masterGain.gain.value=cfg.volume/100;
  saveCfg();document.getElementById('config-overlay').classList.remove('open');
  drawWheel(currentAngle);connectTwitch();
});
document.getElementById('cfg-cancel-btn').addEventListener('click',()=>{cfg=loadCfg();document.getElementById('config-overlay').classList.remove('open');drawWheel(currentAngle);});

const params=new URLSearchParams(window.location.search);
if(params.get('config')==='1')openConfig();

drawWheel(currentAngle);
if(cfg.clientId&&cfg.oauthToken)connectTwitchAndValidate();
</script>
</body>
</html>
