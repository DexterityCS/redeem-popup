<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Connecting...</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Inter', 'Segoe UI', sans-serif;
    background: #0e0c14;
    color: #f0eeff;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    flex-direction: column;
    gap: 16px;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(145,71,255,0.2);
    border-top-color: #9147ff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  p { font-size: 14px; color: rgba(240,238,255,0.5); }
  .error { color: #ff4d6a; font-size: 14px; text-align: center; max-width: 300px; line-height: 1.5; display: none; }
</style>
</head>
<body>
<div class="spinner" id="spinner"></div>
<p id="msg">Connecting your Twitch account...</p>
<p class="error" id="err"></p>

<script>
(function() {
  const hash = window.location.hash;
  const params = new URLSearchParams(hash.replace(/^#/, ''));
  const token = params.get('access_token');
  const error = params.get('error_description') || params.get('error');

  if (error) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('msg').style.display = 'none';
    const errEl = document.getElementById('err');
    errEl.textContent = 'Twitch login failed: ' + error + '. Close this window and try again.';
    errEl.style.display = 'block';
    return;
  }

  if (!token) {
    document.getElementById('msg').textContent = 'No token found. Close this window and try again.';
    return;
  }

  // Post token back to the opener (setup page)
  if (window.opener && !window.opener.closed) {
    window.opener.postMessage({ access_token: token }, window.location.origin);
    document.getElementById('msg').textContent = 'Connected! This window will close...';
    setTimeout(() => window.close(), 800);
  } else {
    // Fallback: opener was closed, store in localStorage and redirect
    try {
      const saved = JSON.parse(localStorage.getItem('overlay-config') || '{}');
      saved.accessToken = token;
      localStorage.setItem('overlay-config', JSON.stringify(saved));
      localStorage.setItem('oauth_token_pending', token);
    } catch(e) {}
    document.getElementById('msg').textContent = 'Redirecting back...';
    // Redirect to setup page (same directory)
    window.location.href = window.location.pathname.replace('callback.html', 'index.html') + '#token_ready';
  }
})();
</script>
</body>
</html>
