<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Connecting...</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter','Segoe UI',sans-serif; background:#0e0c14; color:#f0eeff; display:flex; align-items:center; justify-content:center; height:100vh; flex-direction:column; gap:16px; }
  .spinner { width:36px; height:36px; border:3px solid rgba(145,71,255,0.2); border-top-color:#9147ff; border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  p { font-size:14px; color:rgba(240,238,255,0.5); text-align:center; max-width:320px; line-height:1.6; }
  .error { color:#ff4d6a; font-size:14px; text-align:center; max-width:320px; line-height:1.6; display:none; }
  pre { font-size:11px; color:rgba(145,71,255,0.7); background:rgba(145,71,255,0.1); padding:10px; border-radius:8px; max-width:320px; word-break:break-all; white-space:pre-wrap; display:none; }
</style>
</head>
<body>
<div class="spinner" id="spinner"></div>
<p id="msg">Connecting your Twitch account...</p>
<p class="error" id="err"></p>
<pre id="debug"></pre>

<script>
(function() {
  var rawHash   = window.location.hash   || '';
  var rawSearch = window.location.search || '';
  var rawHref   = window.location.href   || '';

  var fromHash   = new URLSearchParams(rawHash.replace(/^#/, ''));
  var fromSearch = new URLSearchParams(rawSearch.replace(/^\?/, ''));

  var token = fromHash.get('access_token') || fromSearch.get('access_token');
  var error = fromHash.get('error_description') || fromSearch.get('error_description')
           || fromHash.get('error')             || fromSearch.get('error');

  if (error) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('msg').style.display = 'none';
    var e1 = document.getElementById('err');
    e1.textContent = 'Twitch login failed: ' + decodeURIComponent(error) + '. Close this window and try again.';
    e1.style.display = 'block';
    return;
  }

  if (!token) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('msg').style.display = 'none';
    var e2 = document.getElementById('err');
    e2.textContent = 'No token received from Twitch. This usually means the redirect URI in your Twitch app settings does not match exactly. Close this window and check your Twitch app settings.';
    e2.style.display = 'block';
    var dbg = document.getElementById('debug');
    dbg.style.display = 'block';
    dbg.textContent = 'Full URL: ' + rawHref + '\nHash: ' + rawHash + '\nSearch: ' + rawSearch;
    return;
  }

  document.getElementById('msg').textContent = 'Connected! Closing...';

  // Always write to localStorage first — setup page polls this
  try { localStorage.setItem('oauth_token_pending', token); } catch(e) {}

  // Also try postMessage to opener
  if (window.opener && !window.opener.closed) {
    try {
      window.opener.postMessage({ access_token: token }, '*');
    } catch(e) {}
    // Wait long enough for postMessage to land, then close
    setTimeout(function() { window.close(); }, 1500);
  } else {
    // No opener — redirect back to setup page with token in hash
    document.getElementById('msg').textContent = 'Redirecting back...';
    setTimeout(function() {
      window.location.replace('https://dexteritycs.github.io/redeem-popup/#access_token=' + token);
    }, 800);
  }
})();
</script>
</body>
</html>
